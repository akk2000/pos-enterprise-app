name: 🚀 Deploy 3-Tier POS System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  

    steps:
    - name: 🚚 Checkout Code
      uses: actions/checkout@v3

    - name: 🔄 Pull and Restart Containers
      run: |
        cd /home/akk/pos-enterprise-app
        git pull origin main
        sudo docker compose up -d --build